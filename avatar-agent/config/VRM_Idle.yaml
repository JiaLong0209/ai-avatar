behaviors:
  VRM_Idle:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024       # 稍微調小，增加更新頻率
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 1.0e-2           # 提高熵權重，幫助從「摔倒姿勢」中探索站起路徑
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 512      # 增加神經元數量，應對 11 根骨骼的複雜度
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99         # 更看重長線任務
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 5000000       # 建議至少跑 5M 步
    time_horizon: 64        # 增加觀察的時間視窗
    summary_freq: 3000